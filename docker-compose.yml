version: "3.4"

services:
  new-api:
    image: jahnlis/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://admin:semitech@1Panel-postgresql-Umtv:5432/postgres
      - REDIS_CONN_STRING=redis://:semitech@1Panel-redis-SRr2
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    #      - STREAMING_TIMEOUT=300
    #      - SESSION_SECRET=random_string
    #      - SYNC_FREQUENCY=60
    networks:
      - 1panel-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  1panel-network:
    external: true
